<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ATOM -->
    <g id="atom">
      <circle cx="20" cy="20" r="3.5" fill="#B896F0"/>
      <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="#9B72E8" stroke-width="1.3"/>
      <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="#9B72E8" stroke-width="1.3" transform="rotate(60 20 20)"/>
      <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="#9B72E8" stroke-width="1.3" transform="rotate(120 20 20)"/>
    </g>
    <!-- LAPTOP -->
    <g id="laptop">
      <rect x="0" y="3" width="46" height="32" rx="4" fill="#7C50D6" stroke="#9B72E8" stroke-width="1"/>
      <rect x="3" y="6" width="40" height="23" rx="2" fill="#5A2FA8"/>
      <line x1="7" y1="12" x2="22" y2="12" stroke="#9B72E8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="7" y1="17" x2="30" y2="17" stroke="#9B72E8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="7" y1="22" x2="18" y2="22" stroke="#9B72E8" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M25 16 L30 19 L25 22" fill="none" stroke="#B896F0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="-2" y="35" width="50" height="4" rx="2" fill="#7C50D6"/>
      <rect x="16" y="39" width="14" height="2" rx="1" fill="#9B72E8"/>
    </g>
    <!-- CALCULATOR -->
    <g id="calc">
      <rect x="0" y="0" width="36" height="44" rx="5" fill="#7C50D6" stroke="#9B72E8" stroke-width="1"/>
      <rect x="4" y="4" width="28" height="10" rx="2" fill="#5A2FA8"/>
      <rect x="4" y="18" width="7" height="7" rx="1.5" fill="#9B72E8" opacity="0.75"/>
      <rect x="14" y="18" width="7" height="7" rx="1.5" fill="#9B72E8" opacity="0.75"/>
      <rect x="24" y="18" width="7" height="7" rx="1.5" fill="#9B72E8" opacity="0.75"/>
      <rect x="4" y="28" width="7" height="7" rx="1.5" fill="#9B72E8" opacity="0.75"/>
      <rect x="14" y="28" width="7" height="7" rx="1.5" fill="#9B72E8" opacity="0.75"/>
      <rect x="24" y="28" width="7" height="7" rx="1.5" fill="#B896F0" opacity="0.9"/>
      <rect x="4" y="38" width="17" height="5" rx="1.5" fill="#9B72E8" opacity="0.6"/>
      <rect x="24" y="38" width="7" height="5" rx="1.5" fill="#9B72E8" opacity="0.75"/>
    </g>
    <!-- TARGET -->
    <g id="target">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#9B72E8" stroke-width="1.3"/>
      <circle cx="20" cy="20" r="12" fill="none" stroke="#9B72E8" stroke-width="1.3"/>
      <circle cx="20" cy="20" r="6" fill="none" stroke="#9B72E8" stroke-width="1.3"/>
      <circle cx="20" cy="20" r="2.5" fill="#B896F0"/>
      <line x1="32" y1="8" x2="23" y2="17" stroke="#B896F0" stroke-width="2" stroke-linecap="round"/>
      <polygon points="22,17 18,10 30,6" fill="#B896F0"/>
    </g>
    <!-- MAGNIFIER -->
    <g id="mag">
      <circle cx="14" cy="14" r="11" fill="none" stroke="#9B72E8" stroke-width="1.8"/>
      <circle cx="14" cy="14" r="7" fill="#5A2FA8" stroke="#9B72E8" stroke-width="1"/>
      <circle cx="12" cy="12" r="2.5" fill="#7C50D6" opacity="0.6"/>
      <line x1="23" y1="23" x2="33" y2="33" stroke="#9B72E8" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- CLIPBOARD -->
    <g id="clip">
      <rect x="0" y="4" width="38" height="36" rx="4" fill="#7C50D6" stroke="#9B72E8" stroke-width="1"/>
      <rect x="11" y="0" width="16" height="8" rx="3" fill="#5A2FA8" stroke="#9B72E8" stroke-width="1"/>
      <path d="M5 14 L8 17 L14 11" fill="none" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="17" y1="14" x2="30" y2="14" stroke="#9B72E8" stroke-width="1.2"/>
      <path d="M5 23 L8 26 L14 20" fill="none" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="17" y1="23" x2="30" y2="23" stroke="#9B72E8" stroke-width="1.2"/>
      <path d="M5 32 L8 35 L14 29" fill="none" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="17" y1="32" x2="30" y2="32" stroke="#9B72E8" stroke-width="1.2"/>
    </g>
    <!-- LIGHTBULB -->
    <g id="bulb">
      <path d="M17 5 C9 5,4 10,4 17 C4 22,7 26,12 28 L12 33 L22 33 L22 28 C27 26,30 22,30 17 C30 10,25 5,17 5Z" fill="#7C50D6" stroke="#9B72E8" stroke-width="1.2"/>
      <line x1="12" y1="31" x2="22" y2="31" stroke="#9B72E8" stroke-width="1.2"/>
      <line x1="13" y1="35" x2="21" y2="35" stroke="#9B72E8" stroke-width="1"/>
      <line x1="17" y1="0" x2="17" y2="3" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4" y1="4" x2="6" y2="6" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="30" y1="4" x2="28" y2="6" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="17" x2="3" y2="17" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="34" y1="17" x2="31" y2="17" stroke="#B896F0" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12 19 Q14 15,17 17 Q20 19,22 15" fill="none" stroke="#B896F0" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <!-- CERTIFICATE -->
    <g id="cert">
      <ellipse cx="21" cy="21" rx="19" ry="19" fill="#7C50D6" stroke="#9B72E8" stroke-width="1.2"/>
      <path d="M21 11 L23 17 L29 17 L24 21 L26 27 L21 23 L16 27 L18 21 L13 17 L19 17Z" fill="#9B72E8" opacity="0.45"/>
      <path d="M15 21 L19 25 L27 17" fill="none" stroke="#B896F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="15" y1="39" x2="21" y2="34" stroke="#9B72E8" stroke-width="2" stroke-linecap="round"/>
      <line x1="27" y1="39" x2="21" y2="34" stroke="#9B72E8" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- TERMINAL/CODE BLOCK -->
    <g id="term">
      <rect x="0" y="0" width="50" height="34" rx="5" fill="#7C50D6" stroke="#9B72E8" stroke-width="1"/>
      <rect x="0" y="0" width="50" height="9" rx="5" fill="#5A2FA8"/>
      <rect x="0" y="5" width="50" height="4" fill="#5A2FA8"/>
      <circle cx="7" cy="4.5" r="2" fill="#B896F0" opacity="0.6"/>
      <circle cx="14" cy="4.5" r="2" fill="#9B72E8" opacity="0.5"/>
      <circle cx="21" cy="4.5" r="2" fill="#7C50D6" opacity="0.7"/>
      <line x1="6" y1="16" x2="18" y2="16" stroke="#B896F0" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="6" y1="21" x2="28" y2="21" stroke="#9B72E8" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="6" y1="26" x2="22" y2="26" stroke="#9B72E8" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M32 14 L38 17 L32 20" fill="none" stroke="#B896F0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <pattern id="bg" x="0" y="0" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect width="220" height="220" fill="#6B3FC5"/>

      <!-- LAPTOP – top-left, slight tilt -->
      <g transform="translate(8, 12) rotate(-8, 23, 20)"><use href="#laptop"/></g>

      <!-- ATOM – upper-right, rotated -->
      <g transform="translate(152, 8) rotate(25, 20, 20)"><use href="#atom"/></g>

      <!-- BINARY top strip -->
      <text x="72" y="22" font-family="monospace" font-size="9" fill="#9B72E8" opacity="0.75" transform="rotate(-5, 72, 22)">10110</text>
      <text x="110" y="38" font-family="monospace" font-size="9" fill="#9B72E8" opacity="0.55" transform="rotate(3, 110, 38)">01001</text>

      <!-- TARGET – mid-left -->
      <g transform="translate(10, 86) rotate(12, 20, 20)"><use href="#target"/></g>

      <!-- MAGNIFIER – center -->
      <g transform="translate(88, 74) rotate(-15, 17, 17)"><use href="#mag"/></g>

      <!-- CALC – mid-right, tilted -->
      <g transform="translate(160, 70) rotate(10, 18, 22)"><use href="#calc"/></g>

      <!-- CLIPBOARD – bottom-left, slight tilt -->
      <g transform="translate(14, 158) rotate(7, 19, 20)"><use href="#clip"/></g>

      <!-- BULB – bottom-center-left, rotated -->
      <g transform="translate(80, 152) rotate(-12, 17, 18)"><use href="#bulb"/></g>

      <!-- CERT – bottom-right, tilt -->
      <g transform="translate(156, 150) rotate(18, 21, 21)"><use href="#cert"/></g>

      <!-- TERMINAL – mid-center, slight rotation -->
      <g transform="translate(82, 8) rotate(5, 25, 17)"><use href="#term"/></g>

      <!-- Binary snippets scattered -->
      <text x="12" y="68" font-family="monospace" font-size="8" fill="#9B72E8" opacity="0.5" transform="rotate(-10, 12, 68)">1010</text>
      <text x="148" y="138" font-family="monospace" font-size="8" fill="#9B72E8" opacity="0.45" transform="rotate(8, 148, 138)">0110</text>
      <text x="56" y="138" font-family="monospace" font-size="8" fill="#9B72E8" opacity="0.4" transform="rotate(-5, 56, 138)">1001</text>
      <text x="130" y="112" font-family="monospace" font-size="8" fill="#9B72E8" opacity="0.4" transform="rotate(15, 130, 112)">0101</text>

      <!-- subtle dots -->
      <circle cx="72" cy="60" r="2" fill="#9B72E8" opacity="0.35"/>
      <circle cx="148" cy="52" r="1.5" fill="#9B72E8" opacity="0.3"/>
      <circle cx="140" cy="170" r="2" fill="#9B72E8" opacity="0.3"/>
      <circle cx="50" cy="110" r="1.5" fill="#9B72E8" opacity="0.25"/>
      <circle cx="215" cy="100" r="1.5" fill="#9B72E8" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="680" height="480" fill="url(#bg)" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/></svg>